name: NexusHR CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend with Maven
        run: |
          cd Comp_Emp_Manage
          ./mvnw clean package -DskipTests

      - name: Build Docker Image (Backend)
        run: |
          docker build -t nexushr/backend:latest ./Comp_Emp_Manage

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Build Docker Image (Frontend)
        run: |
          docker build -t nexushr/frontend:latest ./frontend

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Kubernetes cluster
        run: |
          echo "Simulating deployment to EKS..."
          # In a real environment, you would use aws-actions/configure-aws-credentials
          # and then run `kubectl apply -f k8s/`
          echo "Deployment successful."
