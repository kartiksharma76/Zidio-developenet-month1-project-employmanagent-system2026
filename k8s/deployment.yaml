apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexushr-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexushr-backend
  template:
    metadata:
      labels:
        app: nexushr-backend
    spec:
      containers:
      - name: backend
        image: nexushr/backend:latest
        ports:
        - containerPort: 6161
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service:5432/comp_emp_db"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "password"
        - name: SPRING_REDIS_HOST
          value: "redis-service"
        - name: SPRING_REDIS_PORT
          value: "6379"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexushr-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexushr-frontend
  template:
    metadata:
      labels:
        app: nexushr-frontend
    spec:
      containers:
      - name: frontend
        image: nexushr/frontend:latest
        ports:
        - containerPort: 80
