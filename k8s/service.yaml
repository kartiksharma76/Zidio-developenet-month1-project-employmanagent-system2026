apiVersion: v1
kind: Service
metadata:
  name: nexushr-backend-service
spec:
  type: ClusterIP
  selector:
    app: nexushr-backend
  ports:
    - protocol: TCP
      port: 6161
      targetPort: 6161

---
apiVersion: v1
kind: Service
metadata:
  name: nexushr-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: nexushr-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
# Horizontal Pod Autoscaler for Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexushr-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexushr-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
