version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: nexushr_db
    environment:
      MYSQL_DATABASE: comp_emp_management
      MYSQL_ROOT_PASSWORD: Kartik@2005
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - nexushr_network

  redis:
    image: redis:7-alpine
    container_name: nexushr_redis
    ports:
      - "6379:6379"
    networks:
      - nexushr_network

  backend:
    build:
      context: ./Comp_Emp_Manage
    container_name: nexushr_backend
    ports:
      - "6161:6161"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://database:3306/comp_emp_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Kartik@2005
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    depends_on:
      - database
      - redis
    networks:
      - nexushr_network

  # Frontend block is commented out because the 'frontend' folder is missing.
  # Uncomment this when you add the frontend folder to the repository.
  # frontend:
  #   build:
  #     context: ./frontend
  #   container_name: nexushr_frontend
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     - backend
  #   networks:
  #     - nexushr_network

volumes:
  dbdata:

networks:
  nexushr_network:
    driver: bridge
