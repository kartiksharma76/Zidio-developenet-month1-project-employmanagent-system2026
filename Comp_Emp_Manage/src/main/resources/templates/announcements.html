<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Announcements</title>
</head>
<body>
    <div layout:fragment="content" class="section-bg bg-announcements">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Company Announcements</h2>
            <div sec:authorize="hasRole('ADMIN')">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAnnouncementModal">
                    <i class="fa-solid fa-bullhorn me-2"></i> Post Announcement
                </button>
            </div>
        </div>
        
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row g-4">
            <div class="col-md-12" th:each="announcement : ${announcements}">
                <div class="card border-0 shadow-sm border-start border-primary border-4">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <h5 class="card-title fw-bold text-primary" th:text="${announcement.title}">Title</h5>
                            <div sec:authorize="hasRole('ADMIN')">
                                <form th:action="@{|/announcements/delete/${announcement.id}|}" method="post" class="d-inline" onsubmit="return confirm('Are you sure you want to delete this announcement?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete"><i class="fa-solid fa-trash"></i></button>
                                </form>
                            </div>
                        </div>
                        <h6 class="card-subtitle mb-3 text-muted">
                            <i class="fa-solid fa-user-circle me-1"></i> <span th:text="${announcement.authorName}">Author</span> 
                            &nbsp;|&nbsp; 
                            <i class="fa-solid fa-clock me-1"></i> <span th:text="${#temporals.format(announcement.datePosted, 'dd MMM yyyy, HH:mm')}">Date</span>
                        </h6>
                        <p class="card-text" th:text="${announcement.content}" style="white-space: pre-wrap;">Content</p>
                    </div>
                </div>
            </div>
            
            <div th:if="${announcements.empty}" class="col-12 text-center py-5 text-muted">
                <i class="fa-solid fa-inbox fa-3x mb-3 text-light"></i>
                <h5>No Announcements</h5>
                <p>Check back later for company updates.</p>
            </div>
        </div>
        
        <!-- Add Announcement Modal -->
        <div class="modal fade" id="addAnnouncementModal" tabindex="-1" aria-hidden="true" sec:authorize="hasRole('ADMIN')">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header bg-light border-0">
                        <h5 class="modal-title fw-bold">Post New Announcement</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/announcements/add}" method="post" th:object="${newAnnouncement}">
                        <div class="modal-body p-4">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Title</label>
                                <input type="text" th:field="*{title}" class="form-control" placeholder="E.g., Company Townhall Meeting" required />
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Message Content</label>
                                <textarea th:field="*{content}" class="form-control" rows="5" placeholder="Type the announcement details here..." required></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-0 bg-light">
                            <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-paper-plane me-2"></i> Post</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
