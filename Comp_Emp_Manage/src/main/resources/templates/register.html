<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - HR Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: #fff;
            transition: transform 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
        }
        .glass-card h3 {
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        /* Make select options readable since the dropdown is white in most browsers */
        .form-select option {
            color: #333;
            background: #fff;
        }
        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 8px;
        }
        .btn-success {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
        }
        .btn-success:hover {
            background: linear-gradient(45deg, #38ef7d, #11998e);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 239, 125, 0.6);
        }
        .text-center a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        .text-center a:hover {
            color: #fff;
            text-decoration: underline;
        }
        .alert {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: none;
            color: #fff;
            border-radius: 10px;
        }
        .alert-danger {
            border-left: 4px solid #ff4b2b;
        }
        .row-spacing {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="glass-card">
            <h3 class="text-center">Create an Account</h3>
            
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/register}" method="post" th:object="${employee}">
                <div class="row">
                    <div class="col-md-6 row-spacing">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" id="firstName" th:field="*{firstName}" class="form-control" placeholder="John" required />
                    </div>
                    <div class="col-md-6 row-spacing">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" id="lastName" th:field="*{lastName}" class="form-control" placeholder="Doe" required />
                    </div>
                </div>
                <div class="row-spacing">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="john.doe@example.com" required />
                </div>
                <div class="row-spacing">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Enter a secure password" required />
                </div>
                <div class="row-spacing">
                    <label for="department" class="form-label">Department</label>
                    <input list="departments" id="department" th:field="*{department}" class="form-control" placeholder="Select or type department" required />
                    <datalist id="departments">
                        <option value="HR"></option>
                        <option value="Engineering"></option>
                        <option value="Sales"></option>
                        <option value="Marketing"></option>
                        <option value="Finance"></option>
                        <option value="Operations"></option>
                    </datalist>
                </div>
                <div class="row-spacing">
                    <label for="role" class="form-label">Select Role</label>
                    <select id="role" th:field="*{role}" class="form-select" required>
                        <option value="ROLE_EMPLOYEE">Employee</option>
                        <option value="ROLE_MANAGER">Manager</option>
                        <option value="ROLE_ADMIN">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100 mt-2">Register Now</button>
            </form>
            
            <div class="text-center mt-4">
                <a th:href="@{/login}">Already have an account? Login here</a>
            </div>
        </div>
    </div>
</body>
</html>
