<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">NexusHR</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 250px;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-light: #f8fafc;
            --bg-dark: #0f172a;
            --card-light: #ffffff;
            --card-dark: #1e293b;
            --text-light: #334155;
            --text-dark: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-light);
            transition: all 0.3s ease;
            overflow-x: hidden;
        }

        body.dark-mode {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        /* Sidebar Styling */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #1e293b;
            color: white;
            transition: all 0.3s;
            z-index: 1000;
        }

        #sidebar .sidebar-header {
            padding: 20px;
            background: #0f172a;
            text-align: center;
        }

        #sidebar ul.components {
            padding: 20px 0;
        }

        #sidebar ul li a {
            padding: 12px 20px;
            font-size: 1.1em;
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.3s;
        }

        #sidebar ul li a:hover, #sidebar ul li.active > a {
            color: white;
            background: var(--primary-color);
            border-left: 4px solid white;
        }

        #sidebar ul li a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }

        /* Main Content Styling */
        #main-content {
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
            transition: all 0.3s;
            position: absolute;
            top: 0;
            right: 0;
            padding: 20px;
        }

        /* Top Navbar */
        .navbar {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            padding: 10px 20px;
        }

        body.dark-mode .navbar {
            background: var(--card-dark);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        
        body.dark-mode .navbar-light .navbar-nav .nav-link {
            color: var(--text-dark);
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.3s;
            background-color: var(--card-light);
        }

        body.dark-mode .card {
            background-color: var(--card-dark);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        
        body.dark-mode .table {
            color: var(--text-dark);
        }
        body.dark-mode .table-light th {
            background-color: #334155;
            color: white;
            border-color: #475569;
        }
        body.dark-mode .table-hover tbody tr:hover {
            color: white;
            background-color: rgba(255,255,255,0.05);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #sidebar {
                margin-left: calc(var(--sidebar-width) * -1);
            }
            #sidebar.active {
                margin-left: 0;
            }
            #main-content {
                width: 100%;
            }
            #main-content.active {
                width: calc(100% - var(--sidebar-width));
            }
        }
    </style>
</head>
<body>

    <div class="wrapper d-flex align-items-stretch">
        
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fa-solid fa-layer-group"></i> NexusHR</h3>
            </div>

            <ul class="list-unstyled components mb-5">
                <li th:classappend="${currentUri == '/dashboard' ? 'active' : ''}">
                    <a href="/dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                </li>
                <li th:classappend="${currentUri == '/employees' ? 'active' : ''}" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_MANAGER')">
                    <a href="/employees"><i class="fa-solid fa-users"></i> Employee Directory</a>
                </li>
                <li th:classappend="${currentUri == '/announcements' ? 'active' : ''}">
                    <a href="/announcements"><i class="fa-solid fa-bullhorn"></i> Announcements</a>
                </li>
                <li th:classappend="${currentUri == '/assets' ? 'active' : ''}">
                    <a href="/assets"><i class="fa-solid fa-laptop"></i> Assets Tracker</a>
                </li>
                <li th:classappend="${currentUri == '/expenses' ? 'active' : ''}">
                    <a href="/expenses"><i class="fa-solid fa-receipt"></i> Expense Claims</a>
                </li>
                <li th:classappend="${currentUri == '/attendance' ? 'active' : ''}">
                    <a href="/attendance"><i class="fa-solid fa-clock"></i> Attendance</a>
                </li>
                <li th:classappend="${currentUri == '/leave' ? 'active' : ''}">
                    <a href="/leave"><i class="fa-solid fa-calendar-alt"></i> Leave Requests</a>
                </li>
                <li th:classappend="${currentUri == '/payroll' ? 'active' : ''}" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_EMPLOYEE')">
                    <a href="/payroll"><i class="fa-solid fa-file-invoice-dollar"></i> Payroll</a>
                </li>
                <li th:classappend="${currentUri == '/performance' ? 'active' : ''}">
                    <a href="/performance"><i class="fa-solid fa-star"></i> Performance</a>
                </li>
                <li th:classappend="${currentUri == '/ai-insights' ? 'active' : ''}" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a href="/ai-insights"><i class="fa-solid fa-brain"></i> AI Insights</a>
                </li>
            </ul>

            <div class="p-4 mt-5 text-center">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light w-100"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
                </form>
            </div>
        </nav>

        <!-- Page Content -->
        <div id="main-content" class="p-4">
            
            <!-- Top Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="btn btn-primary d-md-none">
                        <i class="fa fa-bars"></i>
                        <span class="sr-only">Toggle Menu</span>
                    </button>
                    
                    <div class="ms-auto d-flex align-items-center">
                        <span class="me-3 fw-bold" th:text="${#authentication.name}">User</span>
                        <button class="btn btn-outline-secondary rounded-circle me-3" id="themeToggle" style="width: 40px; height: 40px;">
                            <i class="fa-solid fa-moon"></i>
                        </button>
                    </div>
                </div>
            </nav>

            <!-- Main Content Area to be replaced by actual page content -->
            <div layout:fragment="content">
                <!-- Page Content goes here -->
            </div>
            
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1050;">
        <div id="liveToast" class="toast align-items-center text-white bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="fa-solid fa-bell me-2"></i> <span id="toastMessage">Hello, world! This is a toast message.</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- WebSocket Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <!-- Theme Toggle, Sidebar and WebSocket Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function(event) {
            
            // Sidebar Toggle
            const sidebarCollapse = document.getElementById('sidebarCollapse');
            if(sidebarCollapse) {
                sidebarCollapse.addEventListener('click', function () {
                    document.getElementById('sidebar').classList.toggle('active');
                    document.getElementById('main-content').classList.toggle('active');
                });
            }

            // Theme Toggle
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            const icon = themeToggle.querySelector('i');

            const currentTheme = localStorage.getItem('theme');
            if (currentTheme === 'dark') {
                body.classList.add('dark-mode');
                icon.classList.replace('fa-moon', 'fa-sun');
            }

            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'dark');
                    icon.classList.replace('fa-moon', 'fa-sun');
                } else {
                    localStorage.setItem('theme', 'light');
                    icon.classList.replace('fa-sun', 'fa-moon');
                }
            });

            // WebSocket Connection
            const socket = new SockJS('/ws-notifications');
            const stompClient = Stomp.over(socket);
            stompClient.debug = null; // Disable debug logging
            
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/notifications', function (message) {
                    showToast(message.body);
                });
            });

            function showToast(message) {
                const toastLiveExample = document.getElementById('liveToast');
                document.getElementById('toastMessage').innerText = message;
                const toast = new bootstrap.Toast(toastLiveExample);
                toast.show();
            }
        });
    </script>
</body>
</html>
