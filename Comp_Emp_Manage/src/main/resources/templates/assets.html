<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Company Assets</title>
</head>
<body>
    <div layout:fragment="content" class="section-bg bg-assets">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Company Assets Tracker</h2>
            <div th:if="${isAdminOrManager}">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addAssetModal">
                    <i class="fa-solid fa-laptop me-2"></i> Add Asset
                </button>
            </div>
        </div>
        
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="px-4 py-3">Asset Details</th>
                                <th class="px-4 py-3">Serial Number</th>
                                <th class="px-4 py-3">Status</th>
                                <th class="px-4 py-3" th:if="${isAdminOrManager}">Assigned To</th>
                                <th class="px-4 py-3" th:if="${isAdminOrManager}">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="asset : ${assets}">
                                <td class="px-4 py-3">
                                    <div class="fw-bold" th:text="${asset.assetName}">MacBook Pro</div>
                                    <div class="text-muted small" th:text="${asset.assetType}">Laptop</div>
                                </td>
                                <td class="px-4 py-3">
                                    <span class="font-monospace text-muted" th:text="${asset.serialNumber}">SN12345</span>
                                </td>
                                <td class="px-4 py-3">
                                    <span class="badge" 
                                          th:classappend="${asset.status == 'ASSIGNED' ? 'bg-success' : (asset.status == 'AVAILABLE' ? 'bg-primary' : 'bg-warning')}"
                                          th:text="${asset.status}">STATUS</span>
                                </td>
                                <td class="px-4 py-3" th:if="${isAdminOrManager}">
                                    <span th:if="${asset.employee != null}" th:text="${asset.employee.firstName + ' ' + asset.employee.lastName}">Employee Name</span>
                                    <span th:unless="${asset.employee != null}" class="text-muted fst-italic">Unassigned</span>
                                </td>
                                <td class="px-4 py-3" th:if="${isAdminOrManager}">
                                    <form th:if="${asset.employee != null}" th:action="@{|/assets/unassign/${asset.id}|}" method="post" class="d-inline" onsubmit="return confirm('Unassign this asset?');">
                                        <button type="submit" class="btn btn-sm btn-outline-warning" title="Unassign"><i class="fa-solid fa-user-minus"></i></button>
                                    </form>
                                    <button th:unless="${asset.employee != null}" class="btn btn-sm btn-outline-secondary disabled" title="Unassign"><i class="fa-solid fa-user-minus"></i></button>
                                </td>
                            </tr>
                            <tr th:if="${assets == null or assets.empty}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="fa-solid fa-laptop-code fa-3x mb-3 text-light"></i>
                                    <h5>No assets found</h5>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Add Asset Modal -->
        <div class="modal fade" id="addAssetModal" tabindex="-1" aria-hidden="true" th:if="${isAdminOrManager}">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header bg-light border-0">
                        <h5 class="modal-title fw-bold">Register New Asset</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/assets/add}" method="post" th:object="${newAsset}">
                        <div class="modal-body p-4">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Asset Name</label>
                                <input type="text" th:field="*{assetName}" class="form-control" placeholder="E.g., MacBook Pro M2" required />
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Asset Type</label>
                                <select th:field="*{assetType}" class="form-select">
                                    <option value="Laptop">Laptop</option>
                                    <option value="Monitor">Monitor</option>
                                    <option value="Phone">Phone</option>
                                    <option value="Tablet">Tablet</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Serial Number</label>
                                <input type="text" th:field="*{serialNumber}" class="form-control" placeholder="E.g., C02XYZ123" required />
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Assign To (Optional)</label>
                                <select name="employeeId" class="form-select">
                                    <option value="">-- Leave Unassigned --</option>
                                    <option th:each="emp : ${employees}" th:value="${emp.id}" th:text="${emp.firstName + ' ' + emp.lastName}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer border-0 bg-light">
                            <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-plus me-2"></i> Add Asset</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
