<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Attendance Log - NexusHR</title>
</head>
<body>

    <div layout:fragment="content">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Attendance Log</h1>
    </div>

    <!-- Alert Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="fa-solid fa-circle-exclamation me-2"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Action Buttons for Employee -->
    <div th:if="${!isAdminOrManager}" class="mb-4 d-flex gap-3">
        <form th:action="@{/attendance/punch-in}" method="post">
            <button type="submit" class="btn btn-success px-4 py-2 shadow-sm rounded-pill">
                <i class="fa-solid fa-sign-in-alt me-2"></i> Punch In
            </button>
        </form>
        <form th:action="@{/attendance/punch-out}" method="post">
            <button type="submit" class="btn btn-danger px-4 py-2 shadow-sm rounded-pill">
                <i class="fa-solid fa-sign-out-alt me-2"></i> Punch Out
            </button>
        </form>
    </div>

    <!-- Attendance Table -->
    <div class="card shadow-sm border-0 rounded-4 mb-4">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4">
            <h5 class="mb-0 text-primary fw-bold">
                <i class="fa-solid fa-list-ul me-2"></i> Attendance Records
            </h5>
        </div>
        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light text-muted">
                        <tr>
                            <th>Date</th>
                            <th th:if="${isAdminOrManager}">Employee</th>
                            <th>Punch In</th>
                            <th>Punch Out</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(attendanceRecords)}">
                            <td colspan="5" class="text-center py-4 text-muted">
                                <i class="fa-solid fa-calendar-times fs-2 mb-3 opacity-50 d-block"></i>
                                No attendance records found.
                            </td>
                        </tr>
                        <tr th:each="record : ${attendanceRecords}">
                            <td th:text="${record.date}" class="fw-medium"></td>
                            <td th:if="${isAdminOrManager}">
                                <div class="d-flex align-items-center">
                                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 35px; height: 35px;">
                                        <span class="fw-bold" th:text="${record.employee != null and record.employee.firstName != null and record.employee.firstName.length() > 0 ? #strings.substring(record.employee.firstName, 0, 1) : 'U'}"></span>
                                    </div>
                                    <div>
                                        <div class="fw-bold text-dark" th:text="${record.employee != null ? record.employee.firstName + ' ' + record.employee.lastName : 'Unknown Employee'}"></div>
                                        <small class="text-muted" th:text="${record.employee != null ? record.employee.department : 'N/A'}"></small>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="badge bg-success bg-opacity-10 text-success px-2 py-1" th:if="${record.punchInTime != null}">
                                    <i class="fa-regular fa-clock me-1"></i> <span th:text="${record.punchInTime}"></span>
                                </span>
                                <span class="text-muted" th:if="${record.punchInTime == null}">-</span>
                            </td>
                            <td>
                                <span class="badge bg-danger bg-opacity-10 text-danger px-2 py-1" th:if="${record.punchOutTime != null}">
                                    <i class="fa-regular fa-clock me-1"></i> <span th:text="${record.punchOutTime}"></span>
                                </span>
                                <span class="text-muted" th:if="${record.punchOutTime == null}">-</span>
                            </td>
                            <td>
                                <span th:if="${record.status == 'PRESENT'}" class="badge bg-success rounded-pill px-3">Present</span>
                                <span th:if="${record.status == 'ABSENT'}" class="badge bg-danger rounded-pill px-3">Absent</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    </div>
</body>
</html>
