<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Edit Employee</title>
</head>
<body>
    <div layout:fragment="content">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Edit Employee</h2>
            <a th:href="@{/employees}" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-2"></i> Back to Directory
            </a>
        </div>
        
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <form th:action="@{|/employees/edit/${employee.id}|}" method="post" th:object="${employee}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">First Name</label>
                            <input type="text" th:field="*{firstName}" class="form-control" required />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Last Name</label>
                            <input type="text" th:field="*{lastName}" class="form-control" required />
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" th:field="*{email}" class="form-control" required />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Phone Number</label>
                            <input type="text" th:field="*{phone}" class="form-control" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Department</label>
                            <select th:field="*{department}" class="form-select">
                                <option value="Engineering">Engineering</option>
                                <option value="HR">HR</option>
                                <option value="Sales">Sales</option>
                                <option value="Marketing">Marketing</option>
                                <option value="Finance">Finance</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-bold">Salary</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted">$</span>
                                <input type="number" step="0.01" th:field="*{salary}" class="form-control" required />
                            </div>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-save me-2"></i> Update Employee</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</body>
</html>
