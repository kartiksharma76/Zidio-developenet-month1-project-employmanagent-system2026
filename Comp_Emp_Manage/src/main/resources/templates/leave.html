<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head>
    <title>Leave Management</title>
</head>
<body>
    <div layout:fragment="content" class="section-bg bg-leave">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Leave Management</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#applyLeaveModal">
                <i class="fa-solid fa-plus me-2"></i> Apply for Leave
            </button>
        </div>
        
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-check-circle me-2"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card mb-4 border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th th:if="${isAdminOrManager}" class="px-4 py-3">Employee</th>
                                <th class="px-4 py-3">Leave Type</th>
                                <th class="px-4 py-3">Duration</th>
                                <th class="px-4 py-3">Reason</th>
                                <th class="px-4 py-3">Status</th>
                                <th th:if="${isAdminOrManager}" class="px-4 py-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="leave : ${leaves}">
                                <td th:if="${isAdminOrManager}" class="px-4 py-3 fw-bold" th:text="${leave.employee.firstName + ' ' + leave.employee.lastName}">Employee</td>
                                <td class="px-4 py-3 fw-bold" th:text="${leave.leaveType}">Sick Leave</td>
                                <td class="px-4 py-3">
                                    <div th:text="${leave.startDate + ' to ' + leave.endDate}"></div>
                                </td>
                                <td class="px-4 py-3 text-muted" th:text="${leave.reason}">Feeling unwell</td>
                                <td class="px-4 py-3">
                                    <span class="badge rounded-pill px-3 py-2" 
                                          th:classappend="${leave.status == 'PENDING' ? 'bg-warning text-dark' : (leave.status == 'APPROVED' ? 'bg-success' : 'bg-danger')}" 
                                          th:text="${leave.status}">PENDING</span>
                                </td>
                                <td th:if="${isAdminOrManager}" class="px-4 py-3">
                                    <div class="d-flex gap-2" th:if="${leave.status == 'PENDING'}">
                                        <form th:action="@{/leave/approve/{id}(id=${leave.id})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-success"><i class="fa-solid fa-check"></i></button>
                                        </form>
                                        <form th:action="@{/leave/reject/{id}(id=${leave.id})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-danger"><i class="fa-solid fa-xmark"></i></button>
                                        </form>
                                    </div>
                                    <div th:if="${leave.status != 'PENDING'}">
                                        <span class="text-muted"><i class="fa-solid fa-check-double"></i> Processed</span>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${leaves.empty}">
                                <td colspan="6" class="text-center py-5 text-muted">
                                    <i class="fa-solid fa-calendar-xmark fa-3x mb-3 text-light"></i>
                                    <h5>No leave requests found</h5>
                                    <p>You haven't applied for any leaves yet.</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Apply Leave Modal -->
        <div class="modal fade" id="applyLeaveModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header bg-light border-0">
                        <h5 class="modal-title fw-bold">Apply for Leave</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/leave/apply}" method="post" th:object="${newLeave}">
                        <div class="modal-body p-4">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Leave Type</label>
                                <select th:field="*{leaveType}" class="form-select" required>
                                    <option value="SICK">Sick Leave</option>
                                    <option value="CASUAL">Casual Leave</option>
                                    <option value="EARNED">Earned Leave</option>
                                </select>
                            </div>
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Start Date</label>
                                    <input type="date" th:field="*{startDate}" class="form-control" required />
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">End Date</label>
                                    <input type="date" th:field="*{endDate}" class="form-control" required />
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Reason</label>
                                <textarea th:field="*{reason}" class="form-control" rows="3" required placeholder="Briefly describe the reason for your leave..."></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-0 bg-light">
                            <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary px-4"><i class="fa-solid fa-paper-plane me-2"></i> Submit Request</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
