# Database configuration (Reverting back to MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/comp_emp_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Kartik@2005

# JPA/Hibernate configuration - ensure this is 'update' to create tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Better compatibility for modern MySQL
spring.jpa.open-in-view=false

# Disable database initialization at startup
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-timeout=5000

# Disable Flyway migrations if database is unavailable
spring.flyway.enabled=false

# Ensure JPA initializes correctly
spring.jpa.defer-datasource-initialization=true

# Your server is running on port 6161
server.port=6161

