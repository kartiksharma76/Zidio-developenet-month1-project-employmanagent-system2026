<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #45a049; }
        .hidden { display: none; }
        .message { margin-top: 15px; font-size: 14px; color: #d9534f; }
        .success { color: #5cb85c; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>
    
    <!-- Step 1: Request OTP -->
    <div id="step1">
        <p>Enter your registered email address to receive an OTP.</p>
        <input type="email" id="emailInput" placeholder="Enter your email" required>
        <button onclick="sendOtp()">Send OTP</button>
    </div>

    <!-- Step 2: Verify OTP & Set New Password -->
    <div id="step2" class="hidden">
        <p>An OTP has been sent to your email.</p>
        <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" required>
        <input type="password" id="newPasswordInput" placeholder="Enter new password" required>
        <button onclick="resetPassword()">Reset Password</button>
    </div>

    <!-- Step 3: Success -->
    <div id="step3" class="hidden">
        <h3 class="success">Password Reset Successful!</h3>
        <p>You can now go back to the login page.</p>
        <a href="/"><button>Go to Login</button></a>
    </div>

    <div id="messageBox" class="message"></div>
</div>

<script>
    const baseUrl = '/api/v1/auth';
    let userEmail = '';

    function showMessage(msg, isSuccess = false) {
        const msgBox = document.getElementById('messageBox');
        msgBox.textContent = msg;
        msgBox.className = isSuccess ? 'message success' : 'message';
    }

    async function sendOtp() {
        const email = document.getElementById('emailInput').value;
        if (!email) {
            showMessage("Please enter your email.");
            return;
        }

        showMessage("Sending OTP, please wait...", true);
        
        try {
            const response = await fetch(`${baseUrl}/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            
            const data = await response.text();
            
            if (response.ok) {
                userEmail = email;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                showMessage("OTP sent successfully to your email!", true);
            } else {
                showMessage(data || "Failed to send OTP.");
            }
        } catch (error) {
            showMessage("Error connecting to server.");
        }
    }

    async function resetPassword() {
        const otp = document.getElementById('otpInput').value;
        const newPassword = document.getElementById('newPasswordInput').value;
        
        if (!otp || !newPassword) {
            showMessage("Please enter both OTP and new password.");
            return;
        }

        showMessage("Verifying OTP and resetting password...", true);
        
        try {
            const response = await fetch(`${baseUrl}/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail, otp: otp, newPassword: newPassword })
            });
            
            const data = await response.text();
            
            if (response.ok) {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
                showMessage(""); 
            } else {
                showMessage(data || "Invalid OTP or failed to reset password.");
            }
        } catch (error) {
            showMessage("Error connecting to server.");
        }
    }
</script>

</body>
</html>
